<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101216">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Macro Pad">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Phone Macro Pad</title>
</head>
<body>
  <main class="phone">
    <section id="settingsPage" class="settings">
      <h1>Macro Pad</h1>
      <p>連線後會由電腦端 Python runtime 傳送控制頁面。</p>
      <div class="form">
        <label>MQTT WebSocket URL
          <input id="mqttUrl" value="wss://broker.emqx.io:8084/mqtt">
        </label>
        <label>Client ID
          <input id="clientId">
        </label>
        <label>Username
          <input id="username" autocomplete="username">
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password">
        </label>
        <label>Base Topic
          <input id="baseTopic" value="macro-pad">
        </label>
        <button id="installButton" class="secondary" type="button">加入主畫面</button>
        <button id="connectButton">連線</button>
      </div>
      <div id="status" class="status">尚未連線</div>
    </section>

    <section id="deckPage" class="deck hidden">
      <header class="deck-header">
        <button id="settingsButton" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Z"></path>
            <path d="M19.4 13.4c.1-.5.1-.9.1-1.4s0-.9-.1-1.4l2-1.5-2-3.4-2.4 1a8 8 0 0 0-2.4-1.4L14.3 2h-4.6l-.4 3.3a8 8 0 0 0-2.4 1.4l-2.4-1-2 3.4 2 1.5c-.1.5-.1.9-.1 1.4s0 .9.1 1.4l-2 1.5 2 3.4 2.4-1a8 8 0 0 0 2.4 1.4l.4 3.3h4.6l.4-3.3a8 8 0 0 0 2.4-1.4l2.4 1 2-3.4-2.1-1.5Z"></path>
          </svg>
        </button>
        <div class="brand-title">PJJ Stream Deck</div>
        <div class="header-side">
          <div class="designer">Design by JJ</div>
          <div id="connectionState" class="connection">??</div>
        </div>
      </header>
      <div id="grid" class="grid"></div>
      <nav id="pageNav" class="page-nav"></nav>
    </section>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
